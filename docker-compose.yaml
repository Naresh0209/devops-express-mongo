version: "3.8"

services:

  mongodb:
    image: mongo
    container_name: mongodb1
    ports:
      - "1000:27017"
    volumes:
      - mongo-data:/data/db

  app:
    build: ./app
    container_name: express-app1
    ports:
      - "2000:3000"
    env_file:
      - ./app/.env
    depends_on:
      - mongodb

volumes:
  mongo-data:
